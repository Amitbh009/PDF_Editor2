name: pdf_editor_pro
description: A professional PDF editor for Android and Windows
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # PDF rendering & editing
  syncfusion_flutter_pdf: ^25.1.41
  syncfusion_flutter_pdfviewer: ^25.1.41

  # File picking & saving
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # Image picking
  image_picker: ^1.1.2
  image_cropper: ^7.1.0

  # Drawing/signature
  flutter_drawing_board: ^1.0.1+2

  # UI
  flutter_colorpicker: ^1.1.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  provider: ^6.1.2
  fluttertoast: ^8.2.6
  share_plus: ^9.0.0
  open_file: ^3.3.2
  uuid: ^4.4.0
  intl: ^0.19.0

  # Drag & drop reorder
  reorderable_grid_view: ^2.2.8

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

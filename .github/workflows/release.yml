name: Flutter Release Pipeline

on:
  push:
    tags:
      - "v*"

jobs:

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"

      # 🔧 Robust patch for android/app/build.gradle
      - name: Patch build.gradle to fix shrinkResources error
        run: |
          FILE="android/app/build.gradle"
          if grep -q "shrinkResources true" "$FILE"; then
            echo "🔍 Found shrinkResources true. Ensuring minifyEnabled true is present..."
            
            # Remove any existing minifyEnabled lines (including commented ones) to avoid duplication
            sed -i '/minifyEnabled/d' "$FILE"
            
            # Find the line with shrinkResources true, capture its indentation, and insert minifyEnabled true before it
            # This uses sed with a capture group and backreference
            sed -i 's/^\(\s*\)shrinkResources true/\1minifyEnabled true\n\1shrinkResources true/' "$FILE"
            
            echo "✅ Patched $FILE"
          else
            echo "✅ No shrinkResources true found, no patch needed."
          fi

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - name: Build Windows App
        run: flutter build windows --release

      # Create a minimal Inno Setup script on the fly
      - name: Create Inno Setup Script
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer
          @"
          [Setup]
          AppName=PDF Editor Pro
          AppVersion=1.0.0
          DefaultDirName={autopf}\PDF Editor Pro
          OutputBaseFilename=PDFEditorProSetup
          OutputDir=..\installer_output

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\PDF Editor Pro"; Filename: "{app}\pdf_editor_pro.exe"
          "@ | Out-File -FilePath installer/setup.iss -Encoding ASCII

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create Installer
        run: |
          iscc installer/setup.iss

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: installer_output/*.exe

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: release/

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release/windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/app-release.apk
            release/app-release.aab
            release/windows/*.exe
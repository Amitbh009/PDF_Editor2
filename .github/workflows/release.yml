name: Flutter Production Build & Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Build Android APK + App Bundle
  # ─────────────────────────────────────────────
  build-android:
    name: "Android – APK & AAB"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Build Windows EXE Installer
  # ─────────────────────────────────────────────
  build-windows:
    name: "Windows – EXE Installer"
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Prepare installer output directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path installer_output | Out-Null

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile installer
        run: iscc installer/setup.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output/PDFEditorProSetup.exe
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Publish GitHub Release (tags only)
  # ─────────────────────────────────────────────
  release:
    name: "GitHub Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: release/

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/app-release.apk
            release/app-release.aab
            release/PDFEditorProSetup.exe
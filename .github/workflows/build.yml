name: Build PDF Editor Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  #  ANDROID APK
  # ═══════════════════════════════════════════════════════════════════════════
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.22.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Confirm Flutter version
        run: flutter --version

      # Create a 100% clean scaffold then inject our code
      - name: Create clean Flutter scaffold (android)
        run: |
          flutter create \
            --org com.pdfeditorpro \
            --project-name pdf_editor_pro \
            --platforms android \
            /tmp/build

      - name: Replace lib/ with repo's lib/
        run: |
          rm -rf /tmp/build/lib
          cp -r "$GITHUB_WORKSPACE/lib" /tmp/build/lib

      - name: Replace pubspec.yaml
        run: |
          cp "$GITHUB_WORKSPACE/pubspec.yaml" /tmp/build/pubspec.yaml

      - name: Copy assets/
        run: |
          mkdir -p /tmp/build/assets/icons
          cp -r "$GITHUB_WORKSPACE/assets/." /tmp/build/assets/ || true

      - name: Write local.properties for CI
        run: |
          FLUTTER_SDK="$(dirname $(dirname $(which flutter)))"
          printf "sdk.dir=%s\nflutter.sdk=%s\n" \
            "$ANDROID_SDK_ROOT" "$FLUTTER_SDK" \
            > /tmp/build/android/local.properties

      - name: Patch app/build.gradle — minSdk/targetSdk/multiDex
        run: |
          F=/tmp/build/android/app/build.gradle
          sed -i \
            -e 's/flutter\.minSdkVersion/21/g' \
            -e 's/flutter\.targetSdkVersion/34/g' \
            -e 's/flutter\.compileSdkVersion/34/g' \
            "$F"
          grep -q "multiDexEnabled" "$F" || \
            sed -i '/defaultConfig {$/a\        multiDexEnabled true' "$F"
          grep -q "multidex" "$F" || \
            sed -i '/dependencies {$/a\    implementation "androidx.multidex:multidex:2.0.1"' "$F"

      - name: Copy AndroidManifest.xml
        run: |
          cp "$GITHUB_WORKSPACE/android/app/src/main/AndroidManifest.xml" \
             /tmp/build/android/app/src/main/AndroidManifest.xml

      - name: Copy file_paths.xml
        run: |
          SRC="$GITHUB_WORKSPACE/android/app/src/main/res/xml/file_paths.xml"
          DST="/tmp/build/android/app/src/main/res/xml"
          if [ -f "$SRC" ]; then
            mkdir -p "$DST"
            cp "$SRC" "$DST/file_paths.xml"
          fi

      - name: flutter pub get
        run: flutter pub get
        working-directory: /tmp/build

      - name: Build APK release (split per ABI)
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --no-tree-shake-icons
        working-directory: /tmp/build

      - name: List APK outputs
        run: ls -lh /tmp/build/build/app/outputs/flutter-apk/

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: PDFEditorPro-Android-arm64
          path: /tmp/build/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: PDFEditorPro-Android-armeabi
          path: /tmp/build/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: PDFEditorPro-Android-x86_64
          path: /tmp/build/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30


  # ═══════════════════════════════════════════════════════════════════════════
  #  WINDOWS EXE
  # ═══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: 🖥️ Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter 3.22.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: |
          flutter config --no-analytics
          flutter config --enable-windows-desktop
          flutter --version

      - name: Create clean Flutter scaffold (windows)
        shell: pwsh
        run: |
          flutter create `
            --org com.pdfeditorpro `
            --project-name pdf_editor_pro `
            --platforms windows `
            C:\build

      - name: Replace lib/ with repo's lib/
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "C:\build\lib" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "$env:GITHUB_WORKSPACE\lib" "C:\build\lib"

      - name: Replace pubspec.yaml
        shell: pwsh
        run: |
          Copy-Item "$env:GITHUB_WORKSPACE\pubspec.yaml" "C:\build\pubspec.yaml" -Force

      - name: Copy assets/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "C:\build\assets\icons" | Out-Null
          Copy-Item -Recurse -Force "$env:GITHUB_WORKSPACE\assets\*" "C:\build\assets\"

      - name: Set app display name
        shell: pwsh
        run: |
          $f = "C:\build\windows\CMakeLists.txt"
          (Get-Content $f) -replace 'set\(BINARY_NAME ".*"\)', 'set(BINARY_NAME "pdf_editor_pro")' |
            Set-Content $f

      - name: Set window title in runner/main.cpp
        shell: pwsh
        run: |
          $f = "C:\build\windows\runner\main.cpp"
          if (Test-Path $f) {
            (Get-Content $f) -replace 'L"[^"]*"', 'L"PDF Editor Pro"' |
              Set-Content $f
          }

      - name: flutter pub get
        run: flutter pub get
        working-directory: C:\build

      - name: Build Windows release
        run: |
          flutter build windows `
            --release `
            --no-tree-shake-icons
        working-directory: C:\build

      - name: Zip release folder
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "C:\build\build\windows\x64\runner\Release\*" `
            -DestinationPath "C:\PDFEditorPro-Windows.zip" `
            -Force

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: PDFEditorPro-Windows-ZIP
          path: C:\PDFEditorPro-Windows.zip
          retention-days: 30

      - name: Upload Windows folder
        uses: actions/upload-artifact@v4
        with:
          name: PDFEditorPro-Windows-EXE
          path: C:\build\build\windows\x64\runner\Release\
          retention-days: 30
